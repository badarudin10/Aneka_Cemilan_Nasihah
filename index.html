<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mie Tumis Kang Udin - Kademangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .font-brand { font-family: 'Playfair Display', serif; }
        .menu-card { transition: all 0.3s ease; border-radius: 24px; overflow: hidden; background: white; border: 1px solid #f3f4f6; }
        .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; items-center; justify-content: center; font-size: 10px; font-weight: bold; }
        #admin-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navigasi -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm border-b">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-orange-600 rounded-full flex items-center justify-center text-white">
                    <i class="fas fa-fire-alt text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-orange-600 font-brand">Mie Tumis Kang Udin</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleCart()" class="relative p-2 text-orange-600">
                    <i class="fas fa-shopping-basket text-2xl"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Banner Hero -->
    <section class="relative h-[40vh] flex items-center justify-center text-white overflow-hidden">
        <div class="absolute inset-0 bg-black/50 z-10"></div>
        <img src="https://images.unsplash.com/photo-1552611052-33e04de081de?q=80&w=1000" class="absolute inset-0 w-full h-full object-cover">
        <div class="relative z-20 text-center px-4">
            <h2 class="text-3xl md:text-5xl font-brand mb-2">Mie Tumis Spesial</h2>
            <p class="text-orange-300 font-bold text-sm tracking-widest">KADEMANGAN - SERPONG</p>
        </div>
    </section>

    <!-- Daftar Menu -->
    <main class="container mx-auto px-4 py-12">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h3 class="text-2xl font-bold font-brand">Pilihan Menu</h3>
                <p class="text-xs text-gray-400">Pesan langsung ke WhatsApp</p>
            </div>
            <button onclick="toggleAdmin()" class="text-gray-300 hover:text-orange-600 text-sm">
                <i class="fas fa-cog"></i> Edit Foto
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="food-container"></div>
        
        <h3 class="text-2xl font-bold font-brand mt-16 mb-8 text-orange-600">Minuman Segar</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="drink-container"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t py-12 text-center px-4">
        <p class="text-sm font-bold text-gray-400 mb-2">MIE TUMIS KANG UDIN</p>
        <p class="text-xs text-gray-400 mb-6">Jl. Raya Kademangan, Serpong, Tangerang Selatan</p>
        <div class="flex justify-center gap-4 text-gray-400">
            <a href="https://wa.me/6285716842806"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <!-- Sidebar Admin (Dashboard Update Foto) -->
    <div id="admin-panel" class="fixed top-0 left-0 h-full w-full md:w-[350px] bg-white shadow-2xl z-[100] transform -translate-x-full flex flex-col">
        <div class="p-6 bg-gray-900 text-white flex justify-between items-center">
            <h4 class="font-bold">Panel Pemilik</h4>
            <button onclick="toggleAdmin()" class="text-xl">&times;</button>
        </div>
        <div class="flex-grow overflow-y-auto p-6 space-y-6">
            <p class="text-xs text-gray-500">Masukkan link foto dari ImgBB untuk mengganti gambar menu.</p>
            <div id="admin-inputs" class="space-y-4"></div>
        </div>
        <div class="p-6 border-t">
            <button onclick="saveAdminChanges()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">Simpan Foto Baru</button>
        </div>
    </div>

    <!-- Sidebar Keranjang -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 bg-orange-600 text-white flex justify-between items-center">
            <h4 class="font-bold">Pesanan Anda</h4>
            <button onclick="toggleCart()" class="text-xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4 bg-gray-50"></div>
        <div class="p-6 border-t bg-white">
            <div class="flex justify-between font-bold text-xl mb-6">
                <span>Total</span>
                <span id="cart-total" class="text-orange-600">Rp 0</span>
            </div>
            <button onclick="sendWA()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-100">
                <i class="fab fa-whatsapp mr-2"></i> Kirim Pesanan ke WA
            </button>
        </div>
    </div>

    <script>
        const defaultFoods = [
            { id: 1, name: "Mie Tumis Seafood Sultan", price: 20000, photo: "https://i.ibb.co.com/HDRnbJW0/1769091977407.png" },
            { id: 2, name: "Mie Tumis Goreng Seafood Sultan", price: 19000, photo: "https://i.ibb.co.com/Y4qCJqZS/1769092432572.png" },
            { id: 3, name: "Mie Tumis Goreng Telur Pedas", price: 15000, photo: "https://i.ibb.co.com/gZnQgfGR/1769091713652.png" },
            { id: 4, name: "Mie Tumis Kuah Pedas", price: 12000, photo: "https://i.ibb.co.com/ymd0DvH8/1769091433977.png" },
            { id: 5, name: "Mie Kuah Sayur Original", price: 10000, photo: "https://i.ibb.co.com/HDPVYN4L/1769091531490.png" }
        ];

        const defaultDrinks = [
            { id: 101, name: "Jus Alpukat", price: 10000, photo: "https://i.ibb.co.com/Gfp9yxHx/jus-alpukat.png" },
            { id: 106, name: "Lemon Tea", price: 8000, photo: "https://i.ibb.co.com/fzGLFxLG/lemon-tea.png" },
            { id: 107, name: "Jus Tomat", price: 8000, photo: "https://i.ibb.co.com/V0bWkY76/jus-tomat.png" }
            { id: 108, name: "Jus Kelapa", price: 15000, photo: "https://i.ibb.co.com/p6cr0k4M/jus-kelapa.png" }        ];

        let foods = JSON.parse(localStorage.getItem('udin_foods')) || defaultFoods;
        let drinks = JSON.parse(localStorage.getItem('udin_drinks')) || defaultDrinks;
        let cart = [];

        function init() {
            const foodCont = document.getElementById('food-container');
            const drinkCont = document.getElementById('drink-container');
            const adminCont = document.getElementById('admin-inputs');
            
            foodCont.innerHTML = ''; drinkCont.innerHTML = ''; adminCont.innerHTML = '';

            foods.forEach(f => {
                foodCont.innerHTML += `
                    <div class="menu-card shadow-sm">
                        <img src="${f.photo}" class="w-full h-48 object-cover" onerror="this.src='https://placehold.co/600x400?text=Foto+Menu'">
                        <div class="p-5 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-sm mb-1">${f.name}</h4>
                                <p class="text-orange-600 font-bold text-sm">Rp ${f.price.toLocaleString()}</p>
                            </div>
                            <button onclick="add(${f.id},'f')" class="bg-orange-600 text-white w-10 h-10 rounded-full shadow-lg"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>`;
                adminCont.innerHTML += `
                    <div class="bg-gray-50 p-3 rounded-lg border">
                        <label class="text-[10px] block font-bold mb-1">${f.name}</label>
                        <input type="text" value="${f.photo}" onchange="updateTempPhoto(${f.id},'f',this.value)" class="w-full text-xs p-2 border rounded" placeholder="Link Direct ImgBB">
                    </div>`;
            });

            drinks.forEach(d => {
                drinkCont.innerHTML += `
                    <div class="menu-card p-2 text-center shadow-sm">
                        <img src="${d.photo}" class="w-full h-32 object-cover rounded-2xl mb-2" onerror="this.src='https://placehold.co/300x300'">
                        <h5 class="text-xs font-bold mb-1 truncate">${d.name}</h5>
                        <p class="text-orange-600 font-bold text-xs mb-3">Rp ${d.price.toLocaleString()}</p>
                        <button onclick="add(${d.id},'d')" class="text-orange-600 text-xl"><i class="fas fa-plus-circle"></i></button>
                    </div>`;
                adminCont.innerHTML += `
                    <div class="bg-blue-50 p-3 rounded-lg border">
                        <label class="text-[10px] block font-bold mb-1">${d.name}</label>
                        <input type="text" value="${d.photo}" onchange="updateTempPhoto(${d.id},'d',this.value)" class="w-full text-xs p-2 border rounded" placeholder="Link Direct ImgBB">
                    </div>`;
            });
        }

        function add(id, type) {
            const list = type === 'f' ? foods : drinks;
            const item = list.find(i => i.id === id);
            const exists = cart.find(c => c.id === id);
            if(exists) exists.qty++; else cart.push({...item, qty:1});
            updateCart();
        }

        function updateCart() {
            const cont = document.getElementById('cart-items');
            const badge = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total');
            cont.innerHTML = '';
            let total = 0; let qty = 0;
            cart.forEach((item, i) => {
                total += item.price * item.qty; qty += item.qty;
                cont.innerHTML += `
                    <div class="flex items-center gap-4 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                        <img src="${item.photo}" class="w-12 h-12 object-cover rounded-lg">
                        <div class="flex-grow">
                            <h5 class="text-xs font-bold">${item.name}</h5>
                            <p class="text-orange-600 text-xs font-bold">Rp ${item.price.toLocaleString()}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="changeQty(${i},-1)" class="w-6 h-6 bg-gray-100 rounded-full text-xs">-</button>
                            <span class="text-xs font-bold">${item.qty}</span>
                            <button onclick="changeQty(${i},1)" class="w-6 h-6 bg-gray-100 rounded-full text-xs">+</button>
                        </div>
                    </div>`;
            });
            badge.innerText = qty;
            totalEl.innerText = `Rp ${total.toLocaleString()}`;
        }

        function changeQty(i, delta) {
            cart[i].qty += delta;
            if(cart[i].qty <= 0) cart.splice(i, 1);
            updateCart();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('-translate-x-full'); }

        function updateTempPhoto(id, type, val) {
            const list = type === 'f' ? foods : drinks;
            const item = list.find(i => i.id === id);
            if(item) item.photo = val;
        }

        function saveAdminChanges() {
            localStorage.setItem('udin_foods', JSON.stringify(foods));
            localStorage.setItem('udin_drinks', JSON.stringify(drinks));
            init();
            toggleAdmin();
            alert("Foto Berhasil Diupdate!");
        }

        function sendWA() {
            if(cart.length === 0) return;
            let text = "*PESANAN MIE TUMIS KANG UDIN*\n\n";
            let total = 0;
            cart.forEach(i => {
                text += `• ${i.name} (${i.qty}x)\n`;
                total += i.price * i.qty;
            });
            text += `\n*TOTAL PEMBAYARAN: Rp ${total.toLocaleString()}*\n\nAlamat Pengiriman:\n[Isi di sini]`;
            window.open(`https://wa.me/6285716842806?text=${encodeURIComponent(text)}`);
        }

        init();
    </script>
</body>
</html>
